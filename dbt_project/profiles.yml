fraud_features:
  target: duckdb
  outputs:
    # ── Offline analytical target (primary) ────────────────────────────────
    duckdb:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', '../data/duckdb/fraud_offline.duckdb') }}"
      schema: main
      threads: 4
    # ── Legacy Postgres target (operational raw data only) ─────────────────
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'fraud_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'fraud_pass') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'fraud_db') }}"
      schema: public
      threads: 4
