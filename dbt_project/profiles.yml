fraud_features:
  target: clickhouse
  outputs:
    # ── ClickHouse: sole offline analytical store ──────────────────────────
    # Uses the `service_writer` role which has INSERT/SELECT/DDL grants on
    # main.* (see infra/clickhouse/02-init-rbac.sh).
    clickhouse:
      type: clickhouse
      driver: http
      host: "{{ env_var('CLICKHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('CLICKHOUSE_PORT', '8123') | int }}"
      user: service_writer
      password: "{{ env_var('CLICKHOUSE_SW_PASSWORD', 'sw_pass') }}"
      schema: main
      secure: false
      threads: 2
      # threads=2 keeps the 3 concurrent fact-model joins from blowing past
      # the container's ~14 GiB usable memory. Intermediate models are cheap
      # (window functions, ~2s each) so lower concurrency has no perf cost.
      # No custom join_algorithm — CH picks per-query. Intermediate models
      # use window functions (no joins). Fact models use hash join by
      # default for the equi-JOINs across per-transaction feature tables.
