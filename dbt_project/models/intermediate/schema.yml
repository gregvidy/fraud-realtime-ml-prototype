version: 2

models:
  - name: int_user_txn_stats
    description: Per-transaction rolling user stats for offline feature engineering.
    columns:
      - name: transaction_id
        tests: [unique, not_null]
      - name: user_id
        tests: [not_null]
      - name: event_timestamp
        tests: [not_null]

  - name: int_user_login_stats
    description: Per-transaction rolling user login failure counts.
    columns:
      - name: transaction_id
        tests: [unique, not_null]

  - name: int_device_stats
    description: Per-transaction rolling device usage stats.
    columns:
      - name: transaction_id
        tests: [unique, not_null]

  - name: int_merchant_stats
    description: Per-transaction rolling merchant risk stats.
    columns:
      - name: transaction_id
        tests: [unique, not_null]

  - name: int_user_txn_online_stats
    description: >
      [COLD START ONLY — tag: cold_start] SQL approximation of Redis
      sliding-window online features (5m/10m/1h) for the first training
      run before online_feature_log has data. Excluded from daily dbt runs.
      Run manually once: dbt run --select tag:cold_start
    columns:
      - name: transaction_id
        tests: [unique, not_null]

  - name: int_device_txn_online_stats
    description: >
      [COLD START ONLY — tag: cold_start] SQL approximation of Redis
      device sliding-window features. Excluded from daily dbt runs.
    columns:
      - name: transaction_id
        tests: [unique, not_null]

  - name: int_user_login_online_stats
    description: >
      [COLD START ONLY — tag: cold_start] SQL approximation of Redis
      login failure sliding-window features. Excluded from daily dbt runs.
    columns:
      - name: transaction_id
        tests: [unique, not_null]
