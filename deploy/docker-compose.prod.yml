# ==============================================================================
# Production Docker Compose — Fraud Scoring Demo
# Usage: docker compose -f deploy/docker-compose.prod.yml up -d
# ==============================================================================
version: "3.9"

services:
  # --------------------------------------------------------------------------
  # PostgreSQL — score logging + feature metadata
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: fraud_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fraud_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fraud_pass}
      POSTGRES_DB: ${POSTGRES_DB:-fraud_db}
      # Performance tuning for 8GB RAM VM
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql/bootstrap:/docker-entrypoint-initdb.d
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=16MB
        -c max_connections=200
        -c log_min_duration_statement=500
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fraud_user}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Redis — online features (sorted sets) + Feast offline feature cache
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: fraud_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --tcp-backlog 511
        --maxclients 10000
        --hz 100
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Fraud Scoring API — FastAPI + Gunicorn
  # --------------------------------------------------------------------------
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: fraud_api
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-fraud_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fraud_pass}
      - POSTGRES_DB=${POSTGRES_DB:-fraud_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - MODEL_PATH=models/lgbm_optimized_model_calibrated.pkl
      - FEAST_REPO_PATH=feast_repo/feature_repo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "2.0"
          memory: 2G
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
