# Dev credentials for the fraud-analytics ClickHouse cluster.
# Matches docker-compose defaults so RBAC verification and app configs behave
# identically across compose and k8s.
# For prod, replace with SealedSecret / ExternalSecret.
---
apiVersion: v1
kind: Secret
metadata:
  name: fraud-analytics-passwords
  namespace: data-plane
type: Opaque
stringData:
  admin: admin_pass
  analyst: analyst_pass
  bi: bi_pass
  ds: ds_pass
  sw: sw_pass
