# k8s Job: creates the 8 topics used by the fraud stream.
# Topic array mirrors streaming/rpk/topics.sh (single source of truth is the
# bash script; this Job's array must stay in sync with that script).
---
apiVersion: batch/v1
kind: Job
metadata:
  name: redpanda-topics-bootstrap
  namespace: data-plane
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: rpk
          image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
          env:
            - name: RPK_BROKERS
              value: "redpanda.data-plane.svc.cluster.local:9093"
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              # (name : partitions : retention_hours) — mirrors streaming/rpk/topics.sh
              TOPICS=(
                  "txn.raw.visa       :6:168"
                  "txn.raw.mastercard :6:168"
                  "txn.raw.amex       :3:168"
                  "txn.raw.qris       :6:168"
                  "txn.raw.debit      :3:168"
                  "txn.raw.digital    :6:168"
                  "txn.scored         :12:720"
                  "login.events       :6:168"
              )
              for spec in "${TOPICS[@]}"; do
                  IFS=':' read -r name parts hours <<< "$spec"
                  name="$(echo "$name" | tr -d '[:space:]')"
                  retention_ms=$(( hours * 3600 * 1000 ))
                  echo "── create topic: $name (parts=$parts retention=${hours}h) ──"
                  rpk topic create "$name" \
                      --partitions "$parts" \
                      --replicas 1 \
                      --config "retention.ms=$retention_ms" 2>&1 | tail -1 || true
              done
              echo "── final topic list ──"
              rpk topic list
